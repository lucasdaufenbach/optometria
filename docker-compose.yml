services:
  db:
    image: postgres:16
    container_name: optometria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: optometria
      POSTGRES_PASSWORD: optometria
      POSTGRES_DB: optometria
    ports:
      - "5432:5432"
    volumes:
      - optometria_pgdata:/var/lib/postgresql/data

volumes:
  optometria_pgdata:
